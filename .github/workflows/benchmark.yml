name: Memory System Benchmark

on:
  push:
    branches: [main, production/*]
  workflow_dispatch:
    inputs:
      adapters:
        description: 'Adapters to run (comma-separated, or "all")'
        required: false
        default: 'cortex'

env:
  CI: true
  CORTEX_API_URL: http://localhost:8003
  CORTEX_TOKEN: ${{ secrets.CORTEX_TOKEN || 'dev-token' }}

jobs:
  benchmark:
    runs-on: ${{ vars.SELF_HOSTED_RUNNER || 'ubuntu-latest' }}
    
    strategy:
      fail-fast: false
      matrix:
        adapter: [cortex]
        include:
          - adapter: cortex
            setup_script: ./scripts/setup_cortex.sh
          - adapter: engram
            setup_script: ./scripts/setup_engram.sh
          - adapter: openclaw_engram
            setup_script: ./scripts/setup_engram.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup memory system
        env:
          CI: true
        run: |
          bash ${{ matrix.setup_script }}

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          sleep 10
          
      - name: Verify services
        run: |
          python scripts/verify_services.py || true

      - name: Run benchmark - ${{ matrix.adapter }}
        id: benchmark
        continue-on-error: true
        run: |
          python src/benchmark_runner.py \
            --adapter ${{ matrix.adapter }} \
            --output results/${{ matrix.adapter }}_results.json || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.adapter }}-results
          path: results/${{ matrix.adapter }}_results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Store timestamp
        run: |
          echo "BENCHMARK_TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker/benchmark-compose.yml down 2>/dev/null || true
          docker stop cortex surrealdb engram openclaw-engram 2>/dev/null || true

  collect-results:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/raw
        continue-on-error: true

      - name: Check if results exist
        id: results_check
        run: |
          if [ -d "results/raw" ] && [ "$(ls -A results/raw 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
            echo "No benchmark results found, skipping report generation"
          fi

      - name: Aggregate results
        if: steps.results_check.outputs.has_results == 'true'
        run: |
          python scripts/aggregate_results.py \
            --input results/raw \
            --output results/summary.json || true

      - name: Generate comparison report
        if: steps.results_check.outputs.has_results == 'true'
        run: |
          python scripts/generate_report.py \
            --results results/summary.json \
            --output results/comparison_report.md || true

      - name: Update leaderboard
        if: steps.results_check.outputs.has_results == 'true'
        run: |
          python scripts/update_leaderboard.py \
            --results results/summary.json || true

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: |
            results/summary.json
            results/comparison_report.md
            results/leaderboard.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit results
        if: steps.results_check.outputs.has_results == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: |
            results/*.json
            results/*.md
          commit_message: "📊 Auto-update benchmark results ${{ env.BENCHMARK_TIMESTAMP }}"
          skip_dirty_check: false
